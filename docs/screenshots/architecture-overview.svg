<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1080" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08141C"/>
      <stop offset="1" stop-color="#102733"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#102430"/>
      <stop offset="1" stop-color="#0B1B24"/>
    </linearGradient>
    <linearGradient id="accent" x1="220" y1="180" x2="960" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9FE870" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#79C0FF" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <rect x="36" y="36" width="1128" height="648" rx="26" fill="url(#accent)" fill-opacity="0.2"/>
  <rect x="52" y="52" width="1096" height="616" rx="24" stroke="#1D4150" stroke-width="2"/>

  <text x="84" y="102" fill="#9FE870" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="4">PHANTOMSCOPE</text>
  <text x="84" y="146" fill="#DBE7EB" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Analyst-Oriented Threat Intelligence Pipeline</text>
  <text x="84" y="182" fill="#8DA4AD" font-family="Arial, Helvetica, sans-serif" font-size="20">Deterministic phishing infrastructure triage with explicit evidence provenance, modular provider adapters, and portfolio-safe offline execution.</text>

  <g filter="url(#shadow)">
    <rect x="86" y="244" width="210" height="138" rx="20" fill="url(#panel)" stroke="#295160" stroke-width="2"/>
    <text x="112" y="286" fill="#9FE870" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">INPUT</text>
    <text x="112" y="324" fill="#DBE7EB" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Target Profile</text>
    <text x="112" y="356" fill="#8DA4AD" font-family="Arial, Helvetica, sans-serif" font-size="18">Brand or domain normalization</text>

    <rect x="336" y="244" width="240" height="138" rx="20" fill="url(#panel)" stroke="#295160" stroke-width="2"/>
    <text x="362" y="286" fill="#9FE870" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">DISCOVERY</text>
    <text x="362" y="324" fill="#DBE7EB" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Candidate Domains</text>
    <text x="362" y="356" fill="#8DA4AD" font-family="Arial, Helvetica, sans-serif" font-size="18">Typosquatting and lure variants</text>

    <rect x="616" y="244" width="236" height="138" rx="20" fill="url(#panel)" stroke="#295160" stroke-width="2"/>
    <text x="642" y="286" fill="#9FE870" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">COLLECTION</text>
    <text x="642" y="324" fill="#DBE7EB" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">CT Evidence</text>
    <text x="642" y="356" fill="#8DA4AD" font-family="Arial, Helvetica, sans-serif" font-size="18">Provider-backed log observations</text>

    <rect x="892" y="244" width="222" height="138" rx="20" fill="url(#panel)" stroke="#295160" stroke-width="2"/>
    <text x="918" y="286" fill="#9FE870" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">ENRICHMENT</text>
    <text x="918" y="324" fill="#DBE7EB" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Infra Context</text>
    <text x="918" y="356" fill="#8DA4AD" font-family="Arial, Helvetica, sans-serif" font-size="18">RDAP, DNS, IP, ASN metadata</text>

    <rect x="156" y="456" width="252" height="150" rx="20" fill="url(#panel)" stroke="#295160" stroke-width="2"/>
    <text x="182" y="498" fill="#FFD866" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">SCORING</text>
    <text x="182" y="536" fill="#DBE7EB" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Explainable Rules</text>
    <text x="182" y="568" fill="#8DA4AD" font-family="Arial, Helvetica, sans-serif" font-size="18">Named signals with rationale</text>

    <rect x="474" y="456" width="252" height="150" rx="20" fill="url(#panel)" stroke="#295160" stroke-width="2"/>
    <text x="500" y="498" fill="#FFD866" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">SUMMARIZATION</text>
    <text x="500" y="536" fill="#DBE7EB" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Analyst Narrative</text>
    <text x="500" y="568" fill="#8DA4AD" font-family="Arial, Helvetica, sans-serif" font-size="18">AI-assisted, evidence-grounded output</text>

    <rect x="792" y="456" width="252" height="150" rx="20" fill="url(#panel)" stroke="#295160" stroke-width="2"/>
    <text x="818" y="498" fill="#FFD866" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">DELIVERY</text>
    <text x="818" y="536" fill="#DBE7EB" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">API and Dashboard</text>
    <text x="818" y="568" fill="#8DA4AD" font-family="Arial, Helvetica, sans-serif" font-size="18">Reports, JSON, Markdown, UI</text>
  </g>

  <path d="M296 313H336" stroke="#79C0FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M576 313H616" stroke="#79C0FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M852 313H892" stroke="#79C0FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M1003 382V418H282V456" stroke="#79C0FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M408 531H474" stroke="#9FE870" stroke-width="4" stroke-linecap="round"/>
  <path d="M726 531H792" stroke="#9FE870" stroke-width="4" stroke-linecap="round"/>

  <circle cx="316" cy="313" r="6" fill="#79C0FF"/>
  <circle cx="596" cy="313" r="6" fill="#79C0FF"/>
  <circle cx="872" cy="313" r="6" fill="#79C0FF"/>
  <circle cx="1003" cy="418" r="6" fill="#79C0FF"/>
  <circle cx="282" cy="418" r="6" fill="#79C0FF"/>
  <circle cx="441" cy="531" r="6" fill="#9FE870"/>
