services:
  - type: web
    name: phantomscope-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-dev.txt && pip install -e .
    startCommand: uvicorn phantomscope.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PHANTOMSCOPE_ENV
        value: production
      - key: PHANTOMSCOPE_LOG_LEVEL
        value: INFO
      - key: PHANTOMSCOPE_OFFLINE_MODE
        value: true
      - key: PHANTOMSCOPE_DATABASE_URL
        value: sqlite:///./phantomscope.db

  - type: web
    name: phantomscope-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-dev.txt && pip install -e .
    startCommand: streamlit run app/dashboard.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PHANTOMSCOPE_ENV
        value: production
      - key: PHANTOMSCOPE_LOG_LEVEL
        value: INFO
      - key: PHANTOMSCOPE_OFFLINE_MODE
        value: true
      - key: PHANTOMSCOPE_DASHBOARD_API_URL
        sync: false
